name: Serenity Tests CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current commit
        run: git rev-parse HEAD

      - name: Show serenity.conf content
        run: cat src/test/resources/serenity.conf || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Remove firefox
        run: sudo apt-get remove -y firefox || true

      - name: Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Firefox version
        run: firefox --version

      - name: Debug Firefox path
        run: ls -l /usr/bin/firefox || true

      - name: Debug full environment
        run: |
            echo "HEADLESS=$HEADLESS"
            echo "webdriver.driver=$WEBDRIVER_DRIVER"
            mvn -q dependency:tree | grep serenity || true

      #- name: Cache Maven dependencies
        #  uses: actions/cache@v4
          #with:
          #path: ~/.m2
        #key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: mvn clean verify -q -Dwebdriver.driver=firefox
        env:
          HEADLESS: true

      - name: Serenity Report
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity