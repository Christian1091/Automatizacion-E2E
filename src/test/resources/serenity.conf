webdriver {
  driver = ${?webdriver.driver}
  autodownload = true

  base {
    url = "https://www.saucedemo.com/"
  }
}

firefox {
    headless.mode= ${?headless}
    switches = "-width 1920 -height 1080"
}

chrome {
    switches = "--start-maximized;--disable-gpu;--ignore-certificate-errors--disable-popup-blocking;--disable-notifications;--disable-infobars;--no-default-browser-check;--disable-features=PasswordLeakDetection,PasswordManagerOnboarding,SafeBrowsing"
    headless {
        switches = "--headless=new;--no-sandbox;--disable-dev-shm-usage;--window-size=1920,1080"
    }
}

serenity.take.screenshots = FOR_EACH_ACTION